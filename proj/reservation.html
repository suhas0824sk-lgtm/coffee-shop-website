<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Table Reservation - Coffee Haven</title>
  <link rel="stylesheet" href="reservation.css" />
</head>
<body>
  <header>
    <h1>Reserve a Table</h1>
    <p>Book your table in advance and enjoy your favorite brew with us!</p>
  </header>

  <section class="tables-section">
    <h2>Select a Table</h2>
    <div class="table-grid">
      <!-- Tables will be generated here -->
    </div>
  </section>

  <section class="reservation-form-section">
    <form id="reservationForm">
      <label for="name">Full Name:</label>
      <input type="text" id="name" name="name" required>

      <label for="email">Email Address:</label>
      <input type="email" id="email" name="email" required>

      <label for="phone">Contact Number:</label>
      <input type="tel" id="phone" name="phone" required>

      <label for="guests">Number of Guests:</label>
      <input type="number" id="guests" name="guests" min="1" max="20" required>

      <label for="date">Reservation Date:</label>
      <input type="date" id="date" name="date" required>

      <label for="time">Time:</label>
      <input type="time" id="time" name="time" required>

      <input type="hidden" id="selectedTable" name="table" required>

      <button type="submit">Book Now</button>
    </form>
  </section>

  <footer>
    <p>&copy; 2025 Coffee Haven. All rights reserved.</p>
  </footer>

  <script src="reservation.js"></script>
</body>
</html>
