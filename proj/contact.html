<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Us - Coffee Haven</title>
  <link rel="stylesheet" href="contact.css">
</head>
<body>

  <header class="header">
    <h1>Contact Us</h1>
    <p>We 'd love to hear from you!</p>
  </header>

  <section class="contact-container">
    <div class="contact-form">
      <h2>Send Us a Message</h2>
      <form action="#" method="post">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>

        <label for="message">Message:</label>
        <textarea id="message" name="message" rows="5" required></textarea>

        <button type="submit">Send Message</button>
      </form>
    </div>

    <div class="contact-info">
      <h2>Our Coffee Shop</h2>
      <p><strong>Address:</strong> PES UNIVERSITY</p>
      <p><strong>Phone:</strong> +91 9741297898</p>
      <p><strong>Email:</strong> suhas0824sk@gmail.com</p>

      
      
    </div>
  </section>

  <footer class="footer">
    <p>&copy; 2025 Coffee Haven. All rights reserved.</p>
  </footer>

</body>
</html>
